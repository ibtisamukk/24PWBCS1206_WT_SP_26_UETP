<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5: Flexbox Card Layout</title>
    <link rel="stylesheet" href="../styles/flexbox.css">
</head>
<body>

    <section class="card-container">
        <div class="card">
            <div class="card-content">
                <h3>Web Engineering</h3>
                <p>Short description of the course.</p>
            </div>
            <div class="card-actions">
                <button class="btn">View Details</button>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <h3>Data Science</h3>
                <p>This card has much more content than the others to demonstrate that Flexbox keeps all cards in a row the same height regardless of text length.</p>
            </div>
            <div class="card-actions">
                <button class="btn">View Details</button>
            </div>
        </div>

        <div class="card">
            <div class="card-content">
                <h3>Operating Systems</h3>
                <p>Focuses on kernel development and memory management.</p>
            </div>
            <div class="card-actions">
                <button class="btn">View Details</button>
            </div>
        </div>
    </section>

</body>
</html>
