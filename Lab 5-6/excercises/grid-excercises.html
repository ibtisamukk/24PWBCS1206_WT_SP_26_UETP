<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6: CSS Grid Photo Gallery</title>
    <link rel="stylesheet" href="../styles/grid.css">
</head>
<body>

    <header class="gallery-header">
        <h1>Visual Portfolio</h1>
        <p>A responsive masonry-style gallery using CSS Grid Areas</p>
    </header>

    <div class="gallery-grid">
        <div class="gallery-item span-v">
            <img src="../images/gallery/Profile Pic.jpg" alt="Gallery Image">
            <div class="overlay"><span>Architecture</span></div>
        </div>

        <div class="gallery-item span-h">
            <img src="../images/gallery/Profile Pic.jpg" alt="Gallery Image">
            <div class="overlay"><span>Nature</span></div>
        </div>

        <div class="gallery-item">
            <img src="../images/gallery/Profile Pic.jpg" alt="Gallery Image">
            <div class="overlay"><span>Urban</span></div>
        </div>

        <div class="gallery-item span-v span-h">
            <img src="../images/gallery/Profile Pic.jpg" alt="Gallery Image">
            <div class="overlay"><span>Abstract</span></div>
        </div>
        
        </div>

</body>
</html>
