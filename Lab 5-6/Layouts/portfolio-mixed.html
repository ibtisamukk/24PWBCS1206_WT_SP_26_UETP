<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UET Student Portfolio | Mixed Layouts</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/portfolio.css">
</head>
<body>

    <div class="site-wrapper">
        <div class="blob-bg"></div>

        <nav class="main-nav">
            <div class="logo">PORTFOLIO<span>.</span></div>
            <ul class="nav-links">
                <li><a href="#">Works</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <header class="hero">
            <h1>I engineer <span>digital</span> experiences.</h1>
            <p>Computer Science student at UET Peshawar specializing in modern web architecture.</p>
        </header>

        <main class="gallery-section">
            <div class="gallery-container">
                <div class="project-card tall">
                    <img src="../images/gallery/Profile Pic.jpg" alt="Web Project">
                    <div class="badge">Web Dev</div>
                </div>
                <div class="project-card">
                    <img src="../images/gallery/Pic1.jpg" alt="UI Design">
                    <div class="badge">UI/UX</div>
                </div>
                <div class="project-card">
                    <img src="../images/gallery/Profile Pic.jpg" alt="Mobile App">
                    <div class="badge">App</div>
                </div>
                <div class="project-card wide">
                    <img src="../images/gallery/pic1.jpg" alt="System Design">
                    <div class="badge">System</div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 UET Portfolio Task</p>
        </footer>
    </div>

</body>
</html>
