<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 12: Responsive Form Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/form.css">
</head>
<body>

    <div class="form-container">
        <header class="form-header">
            <h1>Course Registration</h1>
            <p>Please fill in your details to enroll in the Web Engineering lab.</p>
        </header>

        <form action="#">
            <fieldset class="form-section">
                <legend>Personal Information</legend>
                <div class="flex-row">
                    <div class="form-group flex-1">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" placeholder="Ibtisam" required>
                    </div>
                    <div class="form-group flex-1">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" placeholder="Ullah" required>
                    </div>
                </div>

                <div class="flex-row">
                    <div class="form-group flex-2">
                        <label for="email">University Email</label>
                        <input type="email" id="email" placeholder="name@uetpeshawar.edu.pk">
                    </div>
                    <div class="form-group flex-1">
                        <label for="reg">Registration No.</label>
                        <input type="text" id="reg" placeholder="22PWCSE...">
                    </div>
                </div>
            </fieldset>

            <fieldset class="form-section">
                <legend>Lab Preferences</legend>
                <div class="form-group">
                    <label for="track">Specialization Track</label>
                    <select id="track">
                        <option value="frontend">Frontend Engineering</option>
                        <option value="backend">Backend Development</option>
                        <option value="fullstack">Full Stack System Design</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Skill Level</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="lvl" value="beg"> Beginner</label>
                        <label class="radio-item"><input type="radio" name="lvl" value="int"> Intermediate</label>
                        <label class="radio-item"><input type="radio" name="lvl" value="adv"> Advanced</label>
                    </div>
                </div>
            </fieldset>

            <div class="form-actions">
                <button type="reset" class="btn btn-secondary">Clear</button>
                <button type="submit" class="btn btn-primary">Submit Application</button>
            </div>
        </form>
    </div>

</body>
</html>
