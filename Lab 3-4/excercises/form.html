<!DOCTYPE html>
<html>
<head>
    <title>Task 6: Form</title>
    <link rel="stylesheet" href="../styles/form.css">
</head>
<body>

    <form>
        <h2>Register</h2>
        
        <input type="text" placeholder="Username" class="input-field">
        
        <input type="email" placeholder="Email (Error Example)" class="input-error">
        <span class="error-text">Invalid email address</span>

        <select class="dropdown">
            <option>Select Department</option>
            <option>Computer Science</option>
            <option>Electrical</option>
        </select>

        <input type="text" value="Success Example" class="input-success" readonly>

        <button type="submit" class="submit-btn">Register Now</button>
    </form>

</body>
</html>
